services:
  postgres:
    image: postgres:16-alpine
    container_name: gg-dev-postgres
    environment:
      POSTGRES_USER: unibox
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: unibox
    ports:
      - "5432:5432"
    volumes:
      - gg-dev-postgres:/var/lib/postgresql/data

volumes:
  gg-dev-postgres:
