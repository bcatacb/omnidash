# Appservice registration for one mautrix-discord instance.
# Generated by the orchestrator. The shim validates as_token / hs_token
# against the values it loads from /etc/hungry/tokens.json.

id: discord-{{ACCOUNT_ID}}
url: http://bridge-{{ACCOUNT_ID}}:{{APPSERVICE_PORT}}
as_token: "{{AS_TOKEN}}"
hs_token: "{{HS_TOKEN}}"
sender_localpart: discordbot_{{ACCOUNT_ID}}
rate_limited: false
namespaces:
    users:
      - exclusive: true
        regex: "@discord_.*:{{HOMESERVER_DOMAIN}}"
      - exclusive: true
        regex: "@discordbot_{{ACCOUNT_ID}}:{{HOMESERVER_DOMAIN}}"
    aliases:
      - exclusive: true
        regex: "#discord_.*:{{HOMESERVER_DOMAIN}}"
de.sorunome.msc2409.push_ephemeral: true
push_ephemeral: true
org.matrix.msc3202: true
