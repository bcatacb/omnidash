# Internal reverse proxy in front of the api service.
#
# Why this exists:
#   - Single internal hostname for cloudflared (http://localhost:8080) so the
#     tunnel config doesn't need to know about Docker DNS.
#   - Cleanly splits /api from /ws upgrade so we can scale them separately
#     later without touching cloudflared.
#   - Centralised place for client_max_body_size, gzip, etc.
#
# Skip this whole service in docker-compose.prod.yml if you'd rather point
# cloudflared at the api container directly — v1 works fine either way.

worker_processes auto;
worker_rlimit_nofile 65535;
events {
    worker_connections 8192;
    multi_accept on;
}

http {
    # ----- Basics -----
    default_type application/octet-stream;
    include /etc/nginx/mime.types;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # ----- Body / upload limits -----
    client_max_body_size 25m;
    client_body_buffer_size 128k;

    # ----- Compression -----
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/xml;

    # ----- Logging -----
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ----- Upstream -----
    upstream unibox_api {
        server api:3000 max_fails=3 fail_timeout=10s;
        keepalive 32;
    }

    # ----- Map for WS upgrade -----
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ----- HTTPS server (Let's Encrypt cert) -----
    server {
        listen 443 ssl default_server;
        server_name _;

        ssl_certificate     /etc/letsencrypt/live/80-208-224-130.sslip.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/80-208-224-130.sslip.io/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        location /ws {
            proxy_pass http://unibox_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # SSE for realtime updates (Unibox messages etc.) — must disable buffering
        # and use long timeouts so events appear instantly instead of lagged.
        location /api/realtime {
            proxy_pass http://unibox_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /api {
            proxy_pass http://unibox_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Never cache index.html — always serve fresh so new hashed JS bundles
        # are picked up by the browser without a manual hard-refresh.
        location = /index.html {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }

    # ----- HTTP server — ACME challenge + redirect to HTTPS -----
    server {
        listen 80 default_server;
        server_name _;

        # Let's Encrypt renewal challenges (certbot webroot).
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS.
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ----- HTTP fallback (used before cert exists / IP direct access) -----
    server {
        listen 8080;
        server_name _;

        # WebSocket upgrade — must come before /api block.
        location /ws {
            proxy_pass http://unibox_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # SSE for realtime updates (Unibox messages etc.) — must disable buffering
        # and use long timeouts so events appear instantly instead of lagged.
        location /api/realtime {
            proxy_pass http://unibox_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # API — proxy to backend.
        location /api {
            proxy_pass http://unibox_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Frontend — React SPA with fallback to index.html for client-side routing.
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        location = /index.html {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }
    }
}
