# Per-account mautrix-discord config, generated by the orchestrator.
# Placeholders: {{TENANT_ID}} {{ACCOUNT_ID}} {{AS_TOKEN}} {{HS_TOKEN}}
#               {{HOMESERVER_URL}} {{HOMESERVER_DOMAIN}} {{POSTGRES_DSN}}
#               {{APPSERVICE_PORT}}
#
# This template is derived from the upstream mautrix-discord example-config.yaml
# with values stripped down to what's relevant for our SaaS single-tenant
# process-per-account model.

homeserver:
    address: {{HOMESERVER_URL}}
    domain: {{HOMESERVER_DOMAIN}}
    software: standard
    # status_endpoint: hungryshim is on the same docker network as the
    # orchestrator, but the bridge POSTs to the orchestrator directly so
    # we can cache per-account connection state without round-tripping.
    status_endpoint: http://orchestrator:7000/internal/status
    message_send_checkpoint_endpoint: null
    async_media: false
    # Use the appservice websocket transport — see research doc section 4.
    # hungryshim/handlers/appservice.go currently returns 501 on the upgrade
    # endpoint; flip this to false (and let the bridge use HTTP push) until
    # the websocket implementation lands.
    websocket: false
    ping_interval_seconds: 0

appservice:
    address: http://bridge-{{ACCOUNT_ID}}:{{APPSERVICE_PORT}}
    hostname: 0.0.0.0
    port: {{APPSERVICE_PORT}}

    database:
        type: postgres
        uri: {{POSTGRES_DSN}}
        max_open_conns: 10
        max_idle_conns: 2
        max_conn_idle_time: null
        max_conn_lifetime: null

    id: discord-{{ACCOUNT_ID}}
    bot:
        username: discordbot
        displayname: Discord bridge bot
        avatar: mxc://maunium.net/nIdEykemnwdisvHbpxflpDlC

    ephemeral_events: true
    async_transactions: false

    as_token: "{{AS_TOKEN}}"
    hs_token: "{{HS_TOKEN}}"

bridge:
    username_template: discord_{{`{{.}}`}}
    displayname_template: '{{`{{if .Webhook}}Webhook{{else}}{{or .GlobalName .Username}}{{if .Bot}} (bot){{end}}{{end}}`}}'
    channel_name_template: '{{`{{if or (eq .Type 3) (eq .Type 4)}}{{.Name}}{{else}}#{{.Name}}{{end}}`}}'
    guild_name_template: '{{`{{.Name}}`}}'
    private_chat_portal_meta: always

    public_address: null
    avatar_proxy_key: generate

    portal_message_buffer: 128
    startup_private_channel_create_limit: 5
    delivery_receipts: false
    message_status_events: true
    message_error_notices: true
    restricted_rooms: false
    autojoin_thread_on_open: true
    embed_fields_as_tables: true
    mute_channels_on_create: false
    sync_direct_chat_list: false
    resend_bridge_info: false
    custom_emoji_reactions: true
    delete_portal_on_channel_delete: false
    delete_guild_on_leave: true
    federate_rooms: false
    prefix_webhook_messages: true
    enable_webhook_avatars: false
    use_discord_cdn_upload: true
    forbid_dming_strangers: true
    proxy:
    cache_media: never

    direct_media:
        enabled: false

    animated_sticker:
        target: webp
        args:
            width: 320
            height: 320
            fps: 25

    double_puppet_server_map: {}
    double_puppet_allow_discovery: false
    login_shared_secret_map: {}

    command_prefix: '!discord'
    management_room_text:
        welcome: "Hello, I'm the Discord bridge for tenant {{TENANT_ID}}."
        welcome_connected: "Use `help` for help."
        welcome_unconnected: "Use `help` for help or `login` to log in."
        additional_help: ""

    backfill:
        forward_limits:
            initial:
                dm: 0
                channel: 0
                thread: 0
            missed:
                dm: 0
                channel: 0
                thread: 0
        max_guild_members: -1

    # End-to-bridge encryption disabled — we control both ends of the pipe.
    encryption:
        allow: false
        default: false
        appservice: false
        msc4190: false
        require: false
        allow_key_sharing: false
        plaintext_mentions: false
        verification_levels:
            receive: unverified
            send: unverified
            share: cross-signed-tofu
        rotation:
            enable_custom: false
            milliseconds: 604800000
            messages: 100
            disable_device_change_key_rotation: false

    provisioning:
        prefix: /_matrix/provision
        shared_secret: generate
        debug_endpoints: false

    permissions:
        "*": user
        "{{HOMESERVER_DOMAIN}}": admin

logging:
    min_level: info
    writers:
    - type: stdout
      format: pretty-colored
